# ===========================================================================
# air 热重载配置 — API 服务
# 
# air 会监听 .go 文件变更，自动重新编译并重启服务
# 在 Docker 中通过 volume 挂载源码生效
# ===========================================================================

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # 编译命令：构建 cmd/api/main.go
  cmd = "go build -o ./tmp/api ./cmd/api"
  # 运行编译产物
  bin = "./tmp/api"
  # 需要监听的入口文件
  include_ext = ["go", "tpl", "tmpl", "html"]
  # 排除的目录
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  # 排除的文件
  exclude_file = []
  # 编译失败时不清理旧的二进制
  kill_delay = "2s"
  # 日志目录
  log = "air-api.log"
  # 延迟响应多个文件变更
  delay = 1000
  # 发生错误时停止旧进程
  stop_on_error = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
