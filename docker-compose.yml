services:
  postgres:
    image: postgres:18
    container_name: xlab-postgres
    environment:
      POSTGRES_USER: app # 管理员账号密码
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8
    container_name: xlab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: xlab-api
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      REDIS_URL: redis://redis:6379
      APP_ENV: development
      JWT_SECRET: dev-secret-change-in-production
      PORT: "8080"
      FRONTEND_URL: http://localhost:5173
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: xlab-worker
    command: ["air", "-c", ".air.worker.toml"]
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      REDIS_URL: redis://redis:6379
      APP_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xlab-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_started
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  postgres18_data:
